services:
  # ─── Backend Django ───────────────────────────────────────────────
  - type: web
    name: tradutor-bantu-api
    runtime: python3.11
    rootDir: tradutor_bantu
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: gunicorn tradutor_bantu_backend.wsgi:application --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "tradutor-bantu-api.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: tradutor-bantu-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: "https://tradutor-bantu.onrender.com"

  # ─── Frontend React ───────────────────────────────────────────────
  - type: web
    name: tradutor-bantu
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: "https://tradutor-bantu-api.onrender.com"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ─── Base de Dados PostgreSQL ─────────────────────────────────────
databases:
  - name: tradutor-bantu-db
    databaseName: tradutor_bantu
    user: tradutor_bantu
    plan: free
